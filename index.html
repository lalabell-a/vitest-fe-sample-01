<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
  <div class="contenedor">
    <header>
      <h1>📋 Mis Tareas</h1>
    </header>

    <main>
      <form id="form-tarea" class="form-tarea">
        <input
          type="text"
          id="input-tarea"
          class="input-tarea"
          placeholder="Escribe una nueva tarea..."
          autocomplete="off"
        >
        <button type="submit" id="btn-agregar" class="btn btn-agregar">
          Agregar
        </button>
      </form>

      <div id="mensaje-error" class="mensaje-error" aria-live="polite"></div>

      <section class="seccion-tareas">
        <ul id="lista-tareas" class="lista-tareas" aria-label="Lista de tareas">
          <!-- Las tareas se agregan dinámicamente -->
        </ul>

        <div class="tareas-info">
          <span id="contador-tareas">0 tareas</span>
          <button id="btn-limpiar" class="btn btn-limpiar">
            Limpiar completadas
          </button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
